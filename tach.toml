interfaces = []
exclude = [
  "**/*__pycache__",
  "**/*egg-info",
  "**/docs",
  "**/tests",
  "**/venv",
]
source_roots = ["src", "."]
layers = [
  "cli",
  "ext",
  "core",
]

# --- Unlayered (facade + primitives) ---

