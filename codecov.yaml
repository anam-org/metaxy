codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  require_changes: true

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto

  individual_components:
    - component_id: core
      name: Core
      paths:
        - src/metaxy/**
        - "!src/metaxy/ext/**"

    - component_id: ibis
      name: Ibis
      paths:
        - src/metaxy/ext/ibis/**

    - component_id: duckdb
      name: DuckDB
      paths:
        - src/metaxy/ext/duckdb/**

    - component_id: clickhouse
      name: ClickHouse
      paths:
        - src/metaxy/ext/clickhouse/**

    - component_id: postgres
      name: PostgreSQL
      paths:
        - src/metaxy/ext/postgresql/**

    - component_id: delta
      name: Delta Lake
      paths:
        - src/metaxy/ext/polars/handlers/delta.py

    - component_id: iceberg
      name: Iceberg
      paths:
        - src/metaxy/ext/polars/handlers/iceberg.py

    - component_id: lancedb
      name: LanceDB
      paths:
        - src/metaxy/ext/lancedb/**

    - component_id: bigquery
      name: BigQuery
      paths:
        - src/metaxy/ext/bigquery/**

    - component_id: dagster
      name: Dagster
      paths:
        - src/metaxy/ext/dagster/**

    - component_id: ray
      name: Ray
      paths:
        - src/metaxy/ext/ray/**

    - component_id: sqlalchemy
      name: SQLAlchemy
      paths:
        - src/metaxy/ext/sqlalchemy/**

    - component_id: sqlmodel
      name: SQLModel
      paths:
        - src/metaxy/ext/sqlmodel/**

    - component_id: mcp
      name: MCP
      paths:
        - src/metaxy/ext/mcp/**
