<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" width="720" height="260">
  <defs>
    <marker id="fd-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1971c2"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="720" height="260" fill="#ffffff"/>

  <!-- Video (upstream) -->
  <g>
    <rect x="20" y="55" width="230" height="150" rx="8" ry="8" fill="#ffffff" stroke="#6741d9" stroke-width="2.5"/>
    <text x="40" y="90" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#1e1e1e">Video</text>
    <text x="170" y="87" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" fill="#868e96">c9e1f3a5</text>
    <line x1="30" y1="108" x2="240" y2="108" stroke="#6741d9" stroke-width="1.5"/>
    <text x="40" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18" fill="#1e1e1e">audio:</text>
    <text x="135" y="138" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#868e96">a3f8b2c1</text>
    <text x="40" y="175" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18" fill="#1e1e1e">frames:</text>
    <text x="160" y="173" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#868e96">b7d2e4f6</text>
  </g>

  <!-- Transcript (reads Video.audio) -->
  <g>
    <rect x="470" y="25" width="230" height="90" rx="8" ry="8" fill="#ffffff" stroke="#6741d9" stroke-width="2.5"/>
    <text x="490" y="60" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#1e1e1e">Transcript</text>
    <text x="615" y="57" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" fill="#868e96">d4f6a8b0</text>
    <line x1="480" y1="78" x2="690" y2="78" stroke="#6741d9" stroke-width="1.5"/>
    <text x="490" y="105" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18" fill="#1e1e1e">text:</text>
    <text x="560" y="103" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#868e96">e2c4d6f8</text>
  </g>

  <!-- FaceDetection (reads Video.frames) -->
  <g>
    <rect x="470" y="145" width="230" height="90" rx="8" ry="8" fill="#ffffff" stroke="#6741d9" stroke-width="2.5"/>
    <text x="490" y="180" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#1e1e1e">FaceDetection</text>
    <text x="645" y="177" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" fill="#868e96">7a4e9d2b</text>
    <line x1="480" y1="198" x2="690" y2="198" stroke="#6741d9" stroke-width="1.5"/>
    <text x="490" y="225" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18" fill="#1e1e1e">faces:</text>
    <text x="565" y="223" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#868e96">3c8b1f0e</text>
  </g>

  <!-- Edges: Video.audio -> Transcript.text, Video.frames -> FaceDetection.faces -->
  <path d="M 250 138 C 340 138, 360 100, 466 100" stroke="#1971c2" stroke-width="2.5" fill="none" stroke-dasharray="6 6" marker-end="url(#fd-arrow)"/>
  <path d="M 250 173 C 340 173, 360 220, 466 220" stroke="#1971c2" stroke-width="2.5" fill="none" stroke-dasharray="6 6" marker-end="url(#fd-arrow)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" fill="#1971c2">
    <rect x="305" y="72" width="94" height="18" rx="3" fill="#ffffff"/>
    <text x="352" y="85" text-anchor="middle">audio &#8594; text</text>
    <rect x="300" y="228" width="104" height="18" rx="3" fill="#ffffff"/>
    <text x="352" y="241" text-anchor="middle">frames &#8594; faces</text>
  </g>
</svg>
