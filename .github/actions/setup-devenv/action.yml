name: Setup Devenv
description: Install Nix, devenv, direnv and activate the development environment

inputs:
  install-deps:
    description: >
      How to install Python dependencies:
      "all" - sync all extras and groups (for typecheck, docs)
      "minimal" - sync dev group only, no extras (for nox-managed jobs)
      "false" - skip entirely
    required: false
    default: "all"
  extras:
    description: "Space-separated list of extras to install (only used when install-deps is not 'all' or 'false')"
    required: false
    default: ""
  profile:
    description: "Devenv profile to activate (e.g., ci, ci-duckdb). Empty means full default shell."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@v31.10.1
      with:
        nix_path: nixpkgs=channel:nixpkgs-unstable

    - name: Setup Cachix
      uses: cachix/cachix-action@v16
      with:
        name: devenv

    - name: Setup Magic Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@v13

    - name: Install devenv
      shell: bash
      run: nix profile install github:cachix/devenv/f8ca2c061ec2feceee1cf1c5e52c92f58b6aec9c#devenv github:NixOS/nixpkgs/e576e3c9cf9bad747afcddd9e34f51d18c855b4e#direnv

    - name: Activate devenv environment
      shell: bash
      env:
        SKIP_UV_SYNC: "1"
        DEVENV_PROFILE: ${{ inputs.profile }}
      run: |
        direnv allow .
        direnv export gha >> "$GITHUB_ENV"

    - name: Restore devenv.lock if modified
      shell: bash
      run: git checkout -- devenv.lock

    - name: Install Python dependencies
      if: inputs.install-deps != 'false'
      shell: bash
      run: |
        if [ "${{ inputs.install-deps }}" = "minimal" ]; then
          uv sync --group dev
        elif [ -n "${{ inputs.extras }}" ]; then
          EXTRAS_ARGS=""
          for extra in ${{ inputs.extras }}; do
            EXTRAS_ARGS="$EXTRAS_ARGS --extra $extra"
          done
          uv sync --group dev $EXTRAS_ARGS
        else
          uv sync --all-extras --all-groups
        fi
