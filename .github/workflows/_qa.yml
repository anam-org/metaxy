name: _QA (reusable)

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON array of Python versions to test"
        type: string
        default: '["3.10"]'
      run-windows:
        description: "Run Windows tests"
        type: boolean
        default: false
      run-macos:
        description: "Run macOS tests"
        type: boolean
        default: false
      run-all-checks:
        description: "Run all checks regardless of path filters"
        type: boolean
        default: false
      dependency-matrix:
        description: "Run dependency version compatibility tests"
        type: boolean
        default: false
    secrets:
      CODECOV_TOKEN:
        required: false
      MOTHERDUCK_TOKEN:
        required: false
      BIGQUERY_TEST_PROJECT_ID:
        required: false
      BIGQUERY_TEST_CREDENTIALS_JSON:
        required: false

jobs:
  filter:
    runs-on: depot-ubuntu-latest
    outputs:
      test: ${{ steps.filter.outputs.test }}
      docs: ${{ steps.filter.outputs.docs }}
      claude-plugin: ${{ steps.filter.outputs.claude-plugin }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - uses: dorny/paths-filter@v4.0.0
        id: filter
        with:
          filters: |
            test:
              - '.github/workflows/**'
              - .envrc
              - devenv.nix
              - devenv.lock
              - devenv.yaml
              - 'src/metaxy/**'
              - 'tests/**'
              - 'examples/**'
              - 'pyproject.toml'
              - 'uv.lock'
            docs:
              - '.github/workflows/**'
              - mkdocs.yml
              - 'docs/**'
              - slides/2026-introducing-metaxy/package-lock.json
            claude-plugin:
              - '.claude-plugin/**'

  lint:
    runs-on: depot-ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true
      - name: Run Ruff
        run: uv run --no-sync --with ruff ruff check

  deadcode:
    runs-on: depot-ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true
      - name: Run Deadcode
        run: uv run --no-sync --with deadcode deadcode src

  format:
    runs-on: depot-ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true
      - uses: dprint/check@v2.3
        with:
          dprint-version: 0.50.2
      - name: Ruff Format
        run: uv run --no-sync --with ruff ruff format --check --output-format=github

  typecheck:
    runs-on: depot-ubuntu-latest
    needs: filter
    if: ${{ inputs.run-all-checks || needs.filter.outputs.test == 'true' }}
    env:
      DEVENV_PYTHON_VERSION: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Setup devenv
        uses: ./.github/actions/setup-devenv
      - name: Run ty
        run: uv run ty check

  test-linux:
    needs: filter
    if: ${{ inputs.run-all-checks || needs.filter.outputs.test == 'true' }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      checks: write
    runs-on: depot-ubuntu-latest
    env:
      DEVENV_PYTHON_VERSION: ${{ matrix.python-version }}
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      MOTHERDUCK_REGION: eu-central-1
      BIGQUERY_TEST_PROJECT_ID: ${{ (github.ref == 'refs/heads/main' || inputs.run-all-checks || github.event_name == 'workflow_dispatch') && secrets.BIGQUERY_TEST_PROJECT_ID || '' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Setup devenv
        uses: ./.github/actions/setup-devenv

      - name: Write BigQuery credentials file
        if: ${{ secrets.BIGQUERY_TEST_CREDENTIALS_JSON != '' }}
        env:
          BIGQUERY_SA_JSON: ${{ secrets.BIGQUERY_TEST_CREDENTIALS_JSON }}
        run: |
          umask 077
          printf '%s' "$BIGQUERY_SA_JSON" > /tmp/bigquery-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/bigquery-sa.json" >> "$GITHUB_ENV"

      - name: Run Tests with Coverage
        id: pytest
        env:
          # Enable subprocess coverage collection
          COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
          COVERAGE_FILE: ${{ github.workspace }}/.coverage
        run: |
          # Install coverage subprocess support
          SITE_PACKAGES=$(python -c "import sysconfig; print(sysconfig.get_path('purelib'))")
          echo "Installing coverage support to: $SITE_PACKAGES"
          cp .github/coverage_subprocess.pth "$SITE_PACKAGES/" || echo "Warning: Could not install coverage subprocess support"

          # Run tests
          uv run pytest --cov=src/metaxy --cov-branch --durations=10 --junit-xml=./junit.xml -o junit_family=legacy

      - name: Combine Coverage Data
        if: always()
        run: |
          uv run coverage combine --keep || true
          uv run coverage xml -o coverage.xml
          # uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY || true

      # - name: Test Execution Summary
      #   # GitHub actions are horrible, always() here is used to ensure the step runs even if previous steps fail
      #   if: ${{ always() && matrix.python-version == '3.10' && github.event_name == 'pull_request' }}
      #   uses: EnricoMi/publish-unit-test-result-action@v2
      #   with:
      #     files: ./junit.xml
      #     check_name: Test Results (Python ${{ matrix.python-version }})
      #     comment_title: Test Results (Python ${{ matrix.python-version }})
      #     fail_on: nothing

      - name: Upload Coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5.5.2
        with:
          slug: anam-org/metaxy
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: Python${{ matrix.python-version }}

      # - name: Generate Test Timing Report
      #   if: ${{ always() && matrix.python-version == '3.10' && github.event_name == 'pull_request' }}
      #   id: timing
      #   run: |
      #     echo "report<<EOF" >> $GITHUB_OUTPUT
      #     uv run mxtest-analyze-timings ./junit.xml -f markdown >> $GITHUB_OUTPUT
      #     echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload Test Results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5.5.2
        with:
          report_type: test_results
          slug: anam-org/metaxy
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: Python${{ matrix.python-version }}

      # - name: Post Test Timing Comment
      #   if: ${{ always() && matrix.python-version == '3.10' && github.event_name == 'pull_request' }}
      #   uses: marocchino/sticky-pull-request-comment@v2
      #   with:
      #     header: test-timing-report
      #     message: ${{ steps.timing.outputs.report }}

  generate-nox-matrix:
    needs: filter
    if: ${{ inputs.dependency-matrix && (inputs.run-all-checks || needs.filter.outputs.test == 'true') }}
    runs-on: depot-ubuntu-latest
    outputs:
      sessions: ${{ steps.sessions.outputs.sessions }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true
      - name: Generate nox session matrix
        id: sessions
        run: echo "sessions=$(uvx --with nox_uv nox -l --json | jq -c '[.[].session]')" >> "$GITHUB_OUTPUT"

  text-nox:
    needs: [filter, generate-nox-matrix]
    if: ${{ inputs.dependency-matrix && (inputs.run-all-checks || needs.filter.outputs.test == 'true') }}
    runs-on: depot-ubuntu-latest
    env:
      DEVENV_PYTHON_VERSION: "3.10"
    strategy:
      fail-fast: false
      matrix:
        session: ${{ fromJSON(needs.generate-nox-matrix.outputs.sessions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Setup devenv
        uses: ./.github/actions/setup-devenv
      - name: Run ${{ matrix.session }}
        run: uv run nox -s "${{ matrix.session }}"

  test-windows:
    needs: filter
    if: ${{ inputs.run-windows && (inputs.run-all-checks || needs.filter.outputs.test == 'true') }}
    permissions:
      contents: read
    runs-on: windows-latest
    env:
      UV_PYTHON_PREFERENCE: only-system
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true

      - name: Install Dependencies
        run: |
          uv python pin ${{ matrix.python-version }}
          uv sync --group dev --all-extras --no-extra clickhouse

      - name: Run Tests
        run: >
          uv run pytest
          -k "not clickhouse and not graphviz"
          --ignore=tests/docs
          --ignore=tests/cli
          --ignore=tests/examples
          --ignore=tests/ext/ray
          --ignore=tests/project
          --durations=15
          --snapshot-warn-unused

  test-macos:
    needs: filter
    if: ${{ inputs.run-macos && (inputs.run-all-checks || needs.filter.outputs.test == 'true') }}
    permissions:
      contents: read
    runs-on: macos-latest
    env:
      UV_PYTHON_PREFERENCE: only-system
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true

      - name: Install Dependencies
        run: |
          uv python pin ${{ matrix.python-version }}
          uv sync --group dev --all-extras --no-extra clickhouse

      - name: Run Tests
        run: >
          uv run pytest
          -k "not clickhouse and not graphviz"
          --ignore=tests/docs
          --ignore=tests/ext/ray
          --durations=15
          --snapshot-warn-unused

  docs:
    permissions:
      contents: read
    runs-on: depot-ubuntu-latest
    needs:
      - filter
    if: ${{ inputs.run-all-checks || needs.filter.outputs.test == 'true' || needs.filter.outputs.docs == 'true' }}
    env:
      DEVENV_PYTHON_VERSION: "3.10"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Setup devenv
        uses: ./.github/actions/setup-devenv
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: 1.3.1
      - name: Build Docs
        id: docs
        env:
          METAXY_SYNC_DOCS_MOUNTS: "1"
        run: uv run mkdocs build --strict
      - name: Test Docs Snippets
        run: uv run pytest ./docs

  claude-plugin:
    runs-on: depot-ubuntu-latest
    needs: filter
    if: ${{ inputs.run-all-checks || needs.filter.outputs.claude-plugin == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 'lts/*'
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugin manifest
        run: claude plugin validate .
      - name: Validate plugin component paths
        run: |
          plugin_json=".claude-plugin/plugin.json"

          # Check custom skill paths resolve to directories with SKILL.md files
          skills_path=$(jq -r '.skills // empty' "$plugin_json")
          if [ -n "$skills_path" ]; then
            echo "Checking skills path: $skills_path"
            found=0
            for skill_dir in "$skills_path"/*/; do
              if [ -f "${skill_dir}SKILL.md" ]; then
                echo "  ✓ Found skill: $(basename "$skill_dir")"
                found=$((found + 1))
              else
                echo "  ✗ Missing SKILL.md in: $skill_dir"
                exit 1
              fi
            done
            if [ "$found" -eq 0 ]; then
              echo "  ✗ No skills found in $skills_path"
              exit 1
            fi
            echo "  Found $found skill(s)"
          fi

          # Check custom MCP config is valid JSON
          mcp_path=$(jq -r '.mcpServers // empty' "$plugin_json")
          if [ -n "$mcp_path" ] && [ ! -f "$mcp_path" ]; then
            echo "✗ MCP config not found: $mcp_path"
            exit 1
          elif [ -n "$mcp_path" ]; then
            echo "Checking MCP config: $mcp_path"
            jq empty "$mcp_path"
            echo "  ✓ Valid JSON"
            server_count=$(jq 'keys | length' "$mcp_path")
            echo "  Found $server_count MCP server(s)"
          fi

          echo "✓ All plugin component paths valid"

  check:
    permissions: {}
    if: always()
    runs-on: depot-ubuntu-latest
    needs:
      - test-linux
      - generate-nox-matrix
      - text-nox
      - test-windows
      - test-macos
      - lint
      - deadcode
      - format
      - typecheck
      - docs
      - claude-plugin

    steps:
      - name: All Green
        if: always()
        uses: re-actors/alls-green@v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: test-linux, generate-nox-matrix, text-nox, test-windows, test-macos, typecheck, docs, claude-plugin, deadcode
