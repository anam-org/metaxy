name: _QA (reusable)

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON array of Python versions to test"
        type: string
        default: '["3.10"]'
      run-windows:
        description: "Run Windows tests"
        type: boolean
        default: false
      run-macos:
        description: "Run macOS tests"
        type: boolean
        default: false
      run-all-checks:
        description: "Run all checks regardless of path filters"
        type: boolean
        default: false
      dependency-matrix:
        description: "Run dependency version compatibility tests"
        type: boolean
        default: false
    secrets:
      CODECOV_TOKEN:
        required: false
      MOTHERDUCK_TOKEN:
        required: false

jobs:
  filter:
    runs-on: depot-ubuntu-latest
    outputs:
      test: ${{ steps.filter.outputs.test }}
      docs: ${{ steps.filter.outputs.docs }}
      claude-plugin: ${{ steps.filter.outputs.claude-plugin }}
      core: ${{ steps.filter.outputs.core }}
      duckdb: ${{ steps.filter.outputs.duckdb }}
      clickhouse: ${{ steps.filter.outputs.clickhouse }}
      postgres: ${{ steps.filter.outputs.postgres }}
      delta: ${{ steps.filter.outputs.delta }}
      iceberg: ${{ steps.filter.outputs.iceberg }}
      lancedb: ${{ steps.filter.outputs.lancedb }}
      bigquery: ${{ steps.filter.outputs.bigquery }}
      dagster: ${{ steps.filter.outputs.dagster }}
      ray: ${{ steps.filter.outputs.ray }}
      sqlalchemy: ${{ steps.filter.outputs.sqlalchemy }}
      sqlmodel: ${{ steps.filter.outputs.sqlmodel }}
      mcp: ${{ steps.filter.outputs.mcp }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - uses: dorny/paths-filter@v4.0.0
        id: filter
        with:
          filters: |
            test:
              - '.github/workflows/**'
              - .envrc
              - devenv.nix
              - devenv.lock
              - devenv.yaml
              - 'src/metaxy/**'
              - 'tests/**'
              - 'examples/**'
              - 'pyproject.toml'
              - 'uv.lock'
            docs:
              - '.github/workflows/**'
              - mkdocs.yml
              - 'docs/**'
              - slides/2026-introducing-metaxy/package-lock.json
            claude-plugin:
              - '.claude-plugin/**'
            core:
              - 'src/metaxy/**'
              - '!src/metaxy/ext/**'
              - 'tests/metadata_stores/shared/**'
              - 'tests/ext/conftest.py'
              - 'tests/conftest.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/**'
              - '.github/actions/**'
              - .envrc
              - devenv.nix
              - devenv.lock
              - devenv.yaml
            duckdb:
              - 'src/metaxy/ext/metadata_stores/duckdb.py'
              - 'src/metaxy/ext/metadata_stores/ducklake.py'
              - 'tests/ext/duckdb/**'
            clickhouse:
              - 'src/metaxy/ext/metadata_stores/clickhouse.py'
              - 'tests/ext/clickhouse/**'
            postgres:
              - 'src/metaxy/ext/metadata_stores/postgresql.py'
              - 'tests/ext/postgres/**'
            delta:
              - 'src/metaxy/ext/metadata_stores/delta.py'
              - 'tests/ext/delta/**'
            iceberg:
              - 'src/metaxy/ext/metadata_stores/iceberg.py'
              - 'tests/ext/iceberg/**'
            lancedb:
              - 'src/metaxy/ext/metadata_stores/lancedb.py'
              - 'tests/ext/lancedb/**'
            bigquery:
              - 'src/metaxy/ext/metadata_stores/bigquery.py'
              - 'tests/ext/bigquery/**'
            dagster:
              - 'src/metaxy/ext/dagster/**'
              - 'tests/ext/dagster/**'
            ray:
              - 'src/metaxy/ext/ray/**'
              - 'tests/ext/ray/**'
            sqlalchemy:
              - 'src/metaxy/ext/sqlalchemy/**'
              - 'tests/ext/sqlalchemy/**'
            sqlmodel:
              - 'src/metaxy/ext/sqlmodel/**'
              - 'tests/ext/sqlmodel/**'
            mcp:
              - 'src/metaxy/ext/mcp/**'
              - 'tests/ext/mcp/**'

  lint:
    runs-on: depot-ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true
      - name: Run Ruff
        run: uv run --no-sync --with ruff ruff check

  deadcode:
    runs-on: depot-ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true
      - name: Run Deadcode
        run: uv run --no-sync --with deadcode deadcode src

  format:
    runs-on: depot-ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true
      - uses: dprint/check@v2.3
        with:
          dprint-version: 0.50.2
      - name: Ruff Format
        run: uv run --no-sync --with ruff ruff format --check --output-format=github

  typecheck:
    runs-on: depot-ubuntu-latest
    needs: filter
    if: ${{ inputs.run-all-checks || needs.filter.outputs.test == 'true' }}
    env:
      DEVENV_PYTHON_VERSION: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Setup devenv
        uses: ./.github/actions/setup-devenv
      - name: Run ty
        run: uv run ty check

  test-core:
    needs: filter
    if: ${{ inputs.run-all-checks || needs.filter.outputs.test == 'true' }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      checks: write
    runs-on: depot-ubuntu-latest
    env:
      DEVENV_PYTHON_VERSION: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Setup devenv
        uses: ./.github/actions/setup-devenv
        with:
          profile: ci-duckdb
          extras: "duckdb delta"

      - name: Run Tests with Coverage
        id: pytest
        env:
          COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
          COVERAGE_FILE: ${{ github.workspace }}/.coverage
        run: |
          SITE_PACKAGES=$(python -c "import sysconfig; print(sysconfig.get_path('purelib'))")
          cp .github/coverage_subprocess.pth "$SITE_PACKAGES/" || echo "Warning: Could not install coverage subprocess support"
          uv run pytest --ignore=tests/ext --cov=src/metaxy --cov-branch --durations=10 --junit-xml=./junit.xml -o junit_family=legacy

      - name: Combine Coverage Data
        if: always()
        run: |
          uv run coverage combine --keep || true
          uv run coverage xml -o coverage.xml

      - name: Upload Coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5.5.2
        with:
          slug: anam-org/metaxy
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: core-Python${{ matrix.python-version }}

      - name: Upload Test Results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5.5.2
        with:
          report_type: test_results
          slug: anam-org/metaxy
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: core-Python${{ matrix.python-version }}

  test-integrations:
    needs: [filter, generate-nox-matrix]
    if: ${{ (inputs.run-all-checks || needs.filter.outputs.test == 'true') && needs.generate-nox-matrix.outputs.integrations != '[]' }}
    permissions:
      contents: read
    runs-on: depot-ubuntu-latest
    env:
      DEVENV_PYTHON_VERSION: ${{ matrix.python-version }}
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      MOTHERDUCK_REGION: eu-central-1
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
        integration: ${{ fromJSON(needs.generate-nox-matrix.outputs.integrations) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Setup devenv
        uses: ./.github/actions/setup-devenv
        with:
          profile: ci-${{ matrix.integration }}
          install-deps: "minimal"

      - name: Run Tests with Coverage
        env:
          COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
          COVERAGE_FILE: ${{ github.workspace }}/.coverage
        run: >
          uv run nox -s "integration(integration='${{ matrix.integration }}')"
          -- --cov=src/metaxy --cov-branch --junit-xml=./junit.xml -o junit_family=legacy

      - name: Combine Coverage Data
        if: always()
        run: |
          uv run coverage combine --keep || true
          uv run coverage xml -o coverage.xml

      - name: Upload Coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5.5.2
        with:
          slug: anam-org/metaxy
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.integration }}-Python${{ matrix.python-version }}

      - name: Upload Test Results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5.5.2
        with:
          report_type: test_results
          slug: anam-org/metaxy
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.integration }}-Python${{ matrix.python-version }}

  generate-nox-matrix:
    needs: filter
    runs-on: depot-ubuntu-latest
    outputs:
      integrations: ${{ steps.matrix.outputs.integrations }}
      compat-sessions: ${{ steps.matrix.outputs.compat_sessions }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true
      - name: Generate matrices from nox sessions
        id: matrix
        env:
          FILTER_OUTPUTS: ${{ toJSON(needs.filter.outputs) }}
          RUN_ALL: ${{ inputs.run-all-checks }}
          CORE_CHANGED: ${{ needs.filter.outputs.core }}
        run: |
          NOX_JSON=$(uvx --with nox_uv nox -l --json)
          ALL_INTEGRATIONS=$(echo "$NOX_JSON" | jq -c '[.[] | select(.tags | index("integration")) | .call_spec.integration]')

          if [[ "$RUN_ALL" == "true" || "$CORE_CHANGED" == "true" ]]; then
            INTEGRATIONS="$ALL_INTEGRATIONS"
          else
            INTEGRATIONS=$(echo "$ALL_INTEGRATIONS" | jq -c --argjson filters "$FILTER_OUTPUTS" \
              '[.[] | select(. as $name | $filters[$name] == "true")]')
          fi

          echo "integrations=$INTEGRATIONS" >> "$GITHUB_OUTPUT"
          echo "compat_sessions=$(echo "$NOX_JSON" | jq -c '[.[] | select(.tags | index("compat")) | .session]')" >> "$GITHUB_OUTPUT"

  test-nox-compat:
    needs: [filter, generate-nox-matrix]
    if: ${{ inputs.dependency-matrix && (inputs.run-all-checks || needs.filter.outputs.test == 'true') }}
    runs-on: depot-ubuntu-latest
    env:
      DEVENV_PYTHON_VERSION: "3.10"
    strategy:
      fail-fast: false
      matrix:
        session: ${{ fromJSON(needs.generate-nox-matrix.outputs.compat-sessions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Setup devenv
        uses: ./.github/actions/setup-devenv
        with:
          profile: ci-duckdb
          install-deps: "minimal"
      - name: Run ${{ matrix.session }}
        run: uv run nox -s "${{ matrix.session }}"

  test-windows:
    needs: filter
    if: ${{ inputs.run-windows && (inputs.run-all-checks || needs.filter.outputs.test == 'true') }}
    permissions:
      contents: read
    runs-on: windows-latest
    env:
      UV_PYTHON_PREFERENCE: only-system
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true

      - name: Install Dependencies
        run: |
          uv python pin ${{ matrix.python-version }}
          uv sync --group dev --all-extras --no-extra clickhouse

      - name: Run Tests
        run: >
          uv run pytest
          -k "not clickhouse and not graphviz"
          --ignore=tests/docs
          --ignore=tests/cli
          --ignore=tests/examples
          --ignore=tests/ext/ray
          --ignore=tests/project
          --durations=15
          --snapshot-warn-unused

  test-macos:
    needs: filter
    if: ${{ inputs.run-macos && (inputs.run-all-checks || needs.filter.outputs.test == 'true') }}
    permissions:
      contents: read
    runs-on: macos-latest
    env:
      UV_PYTHON_PREFERENCE: only-system
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true

      - name: Install Dependencies
        run: |
          uv python pin ${{ matrix.python-version }}
          uv sync --group dev --all-extras --no-extra clickhouse

      - name: Run Tests
        run: >
          uv run pytest
          -k "not clickhouse and not graphviz"
          --ignore=tests/docs
          --ignore=tests/ext/ray
          --durations=15
          --snapshot-warn-unused

  docs:
    permissions:
      contents: read
    runs-on: depot-ubuntu-latest
    needs:
      - filter
    if: ${{ inputs.run-all-checks || needs.filter.outputs.test == 'true' || needs.filter.outputs.docs == 'true' }}
    env:
      DEVENV_PYTHON_VERSION: "3.10"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Setup devenv
        uses: ./.github/actions/setup-devenv
        with:
          profile: ci-docs
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: 1.3.1
      - name: Build Docs
        id: docs
        env:
          METAXY_SYNC_DOCS_MOUNTS: "1"
        run: uv run mkdocs build --strict
      - name: Test Docs Snippets
        run: uv run pytest ./docs

  claude-plugin:
    runs-on: depot-ubuntu-latest
    needs: filter
    if: ${{ inputs.run-all-checks || needs.filter.outputs.claude-plugin == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 'lts/*'
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugin manifest
        run: claude plugin validate .
      - name: Validate plugin component paths
        run: |
          plugin_json=".claude-plugin/plugin.json"

          # Check custom skill paths resolve to directories with SKILL.md files
          skills_path=$(jq -r '.skills // empty' "$plugin_json")
          if [ -n "$skills_path" ]; then
            echo "Checking skills path: $skills_path"
            found=0
            for skill_dir in "$skills_path"/*/; do
              if [ -f "${skill_dir}SKILL.md" ]; then
                echo "  ✓ Found skill: $(basename "$skill_dir")"
                found=$((found + 1))
              else
                echo "  ✗ Missing SKILL.md in: $skill_dir"
                exit 1
              fi
            done
            if [ "$found" -eq 0 ]; then
              echo "  ✗ No skills found in $skills_path"
              exit 1
            fi
            echo "  Found $found skill(s)"
          fi

          # Check custom MCP config is valid JSON
          mcp_path=$(jq -r '.mcpServers // empty' "$plugin_json")
          if [ -n "$mcp_path" ] && [ ! -f "$mcp_path" ]; then
            echo "✗ MCP config not found: $mcp_path"
            exit 1
          elif [ -n "$mcp_path" ]; then
            echo "Checking MCP config: $mcp_path"
            jq empty "$mcp_path"
            echo "  ✓ Valid JSON"
            server_count=$(jq 'keys | length' "$mcp_path")
            echo "  Found $server_count MCP server(s)"
          fi

          echo "✓ All plugin component paths valid"

  check:
    permissions: {}
    if: always()
    runs-on: depot-ubuntu-latest
    needs:
      - test-core
      - test-integrations
      - generate-nox-matrix
      - test-nox-compat
      - test-windows
      - test-macos
      - lint
      - deadcode
      - format
      - typecheck
      - docs
      - claude-plugin

    steps:
      - name: All Green
        if: always()
        uses: re-actors/alls-green@v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: test-core, test-integrations, generate-nox-matrix, test-nox-compat, test-windows, test-macos, typecheck, docs, claude-plugin, deadcode
