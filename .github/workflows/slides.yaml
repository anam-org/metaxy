name: slides and pdf render

on:
  push:
    branches: [ main ]
    paths:
      - 'slides/**'
  # pull_request:
  #   types: [opened, synchronize, reopened]
  #   branches: [ main ]
  #   paths:
  #     - 'slides/**'
  workflow_dispatch:
    inputs:
      slides_json:
        description: 'JSON list, e.g. ["introducing-metaxy.md"]'
        required: false
        default: '["introducing-metaxy.md"]'

concurrency:
  group: slides-main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build slides and render PDF
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJSON(github.event.inputs.slides_json || '["introducing-metaxy.md"]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: 1.3.1

      - name: Install
        run: cd slides/2026-introducing-metaxy && bun install --frozen-lockfile

      - name: Export ${{ matrix.file }}
        run: cd slides/2026-introducing-metaxy && bun run export --  "${{ matrix.file }}"

      - name: Compute safe artifact name
        id: safename
        shell: bash
        run: |
          f='${{ matrix.file }}'
          safe="${f//\//__}"
          safe="${safe%.md}"
          echo "safe=$safe" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: slides-${{ steps.safename.outputs.safe }}
          path: slides/2026-introducing-metaxy/*-export.pdf
          if-no-files-found: warn
          retention-days: 5

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/upload-artifact/merge@v7.0.0
        with:
          name: slide-pdfs
          pattern: slides-*
          retention-days: 5
