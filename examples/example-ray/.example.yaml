name: "Ray Example"
description: "Distributed video processing with Ray Data, Dagster, and DuckLake."
package_name: "example_ray"

scenarios:
  - name: "Setup video metadata"
    description: "Seed root video metadata via the basic pipeline"
    steps:
      - name: "run_pipeline"
        type: "run_command"
        command: "python -m example_ray.basic_pipeline"
        description: "Run basic pipeline (seed, process, idempotent rerun)"
        capture_output: true
        timeout: 120.0

      - type: "assert_output"
        description: "Verify pipeline completed with processing and idempotency"
        returncode: 0
        contains:
          - "Seeded 3 video samples"
          - "Processed 3 samples"
          - "Nothing to process (idempotent)"

  - name: "Dagster assets"
    description: "Materialize Example 2 Dagster assets and verify data"
    steps:
      - name: "materialize_dagster"
        type: "run_command"
        command: "python -m example_ray.materialize_dagster"
        description: "Materialize all Example 2 Dagster assets"
        capture_output: true
        timeout: 120.0

      - type: "assert_output"
        description: "Verify all Dagster assets materialized and data written"
        returncode: 0
        contains:
          - "all assets materialized successfully"
          - "Verified video:"
          - "Verified crop:"
          - "Verified stt:"
          - "Verified face_detection:"

  - name: "Production assets"
    description: "Materialize Example 3 production asset with branching IO"
    steps:
      - name: "materialize_production"
        type: "run_command"
        command: "python -m example_ray.materialize_production"
        description: "Materialize production asset with branching IO"
        capture_output: true
        timeout: 120.0

      - type: "assert_output"
        description: "Verify production assets materialized and branching IO wrote both features"
        returncode: 0
        contains:
          - "production assets materialized successfully"
          - "Verified video:"
          - "Verified stt:"
          - "Verified crop:"
