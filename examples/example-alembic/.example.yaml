name: "Alembic Migration Example"
description: "Demonstrate Alembic-managed DDL migrations for Metaxy feature tables with DuckLake."
package_name: "example_alembic"
auto_push_graph: false

scenarios:
  - name: "Alembic migration and pipeline run"
    description: "Generate migration, preview DDL, apply it, then write and read feature data"
    steps:
      - name: "generate_migration"
        type: "run_command"
        command: 'uv run alembic revision --autogenerate -m "create feature tables"'
        description: "Generate Alembic migration from SQLModel definitions"
        capture_output: true
        timeout: 30.0

      - type: "assert_output"
        description: "Verify migration was generated"
        returncode: 0
        contains:
          - "Generating"
          - "create_feature_tables"

      - name: "preview_ddl"
        type: "run_command"
        command: "uv run alembic upgrade head --sql"
        description: "Preview the DDL that will be applied"
        capture_output: true
        timeout: 30.0

      - type: "assert_output"
        description: "Verify DDL contains VARIANT, partitioning, and sorting"
        returncode: 0
        contains:
          - "CREATE TABLE examples__alembic_demo"
          - "VARIANT NOT NULL"
          - "PARTITIONED BY"
          - "SORTED BY"

      - name: "apply_migration"
        type: "run_command"
        command: "uv run alembic upgrade head"
        description: "Apply migration to create tables"
        capture_output: true
        timeout: 30.0

      - type: "assert_output"
        description: "Verify migration was applied"
        returncode: 0

      - name: "run_pipeline"
        type: "run_command"
        command: "uv run python src/example_alembic/pipeline.py"
        description: "Run pipeline against Alembic-managed tables"
        capture_output: true
        timeout: 30.0

      - type: "assert_output"
        description: "Verify pipeline wrote and read data successfully"
        returncode: 0
        contains:
          - "Alembic + DuckLake pipeline"
          - "auto_create_tables: False"
          - "Wrote 2 rows"
          - "Feature table: examples__alembic_demo"
          - "clip_001: s3://demo-bucket/processed/clip_001.parquet"
